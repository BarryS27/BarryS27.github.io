name: Build and Deploy

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      DART_SASS_VERSION: '1.77.8'
      LIGHTNINGCSS_VERSION: '1.27.0'

    steps:
      - name: Checkout Repository 🛎️
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Fetch latest @barrys27/ui package 📦
        run: |
          set -euo pipefail

          registry_url="https://registry.npmjs.org/@barrys27%2fui/latest"
          metadata="$(curl -fsSL "$registry_url")" || {
            echo "❌ Failed to reach npm registry endpoint: $registry_url"
            exit 1
          }

          version="$(printf '%s' "$metadata" | sed -n 's/.*"version":"\([^"]*\)".*/\1/p' | head -n1)"
          tarball_url="$(printf '%s' "$metadata" | sed -n 's/.*"tarball":"\([^"]*\)".*/\1/p' | head -n1)"

          if [ -z "$version" ] || [ -z "$tarball_url" ]; then
            echo "❌ Could not resolve package version/tarball from npm registry response"
            exit 1
          fi

          echo "Resolved @barrys27/ui version: $version"

          mkdir -p vendor/ui
          curl -fsSL -o /tmp/barrys27-ui.tgz "$tarball_url" || {
            echo "❌ Failed to download tarball: $tarball_url"
            exit 1
          }

          tar -xzf /tmp/barrys27-ui.tgz -C vendor/ui --strip-components=1 || {
            echo "❌ Failed to extract @barrys27/ui tarball into vendor folder"
            exit 1
          }

          if [ ! -f vendor/ui/src/scss/main.scss ]; then
            echo "❌ Extraction verification failed: vendor/ui/src/scss/main.scss not found"
            exit 1
          fi

          echo "✅ Vendored @barrys27/ui package into ./vendor/ui"

      - name: Set up Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python Dependencies 🔧
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Static Site 🏗️
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY#*/}"
          owner_lower="${owner,,}"
          if [ "$repo" = "${owner_lower}.github.io" ]; then
            export FREEZER_BASE_URL="https://${owner_lower}.github.io/"
          else
            export FREEZER_BASE_URL="https://${owner_lower}.github.io/${repo}/"
          fi
          echo "Using FREEZER_BASE_URL=${FREEZER_BASE_URL}"
          python scss.py
          python freeze.py

      - name: Verify Build 🔍
        run: |
          set -euo pipefail
          required_files=(
            "build/index.html"
            "build/static/css/styles.css"
            "build/static/js/script.js"
            "build/static/js/easter-eggs.js"
            "build/static/images/favicon-96x96.png"
            "build/static/images/favicon.svg"
            "build/static/images/favicon.ico"
            "build/static/images/apple-touch-icon.png"
            "build/static/images/site.webmanifest"
            "build/static/images/profile.webp"
            "build/static/images/og-card.png"
            "build/static/images/background.webp"
            "build/robots.txt"
            "build/sitemap.xml"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Build verification failed: missing artifact '$file'"
              exit 1
            fi
          done

          echo "✅ Build verification passed"

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
          clean: true
          single-commit: true
