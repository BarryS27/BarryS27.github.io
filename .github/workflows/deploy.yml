name: Build and Deploy

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository 🛎️
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync UI main.scss 📦
        run: |
          set -euo pipefail
          curl -L https://unpkg.com/@barrys27/ui/src/scss/main.scss -o static/css/main.scss || {
            echo "❌ Failed to download main.scss from @barrys27/ui"
            exit 1
          }

      - name: Compile CSS 🎨
        run: |
          set -euo pipefail
          sudo snap install dart-sass
          dart-sass static/css/styles.scss static/css/styles.css --no-source-map || {
            echo "❌ SCSS compilation failed"
            exit 1
          }

      - name: Set up Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python Dependencies 🔧
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Auto-commit synced CSS artifacts ✍️
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: sync @barrys27/ui main.scss and compiled styles.css'
          file_pattern: static/css/main.scss static/css/styles.css

      - name: Freeze Static Site 🧊
        run: |
          set -euo pipefail
          python freeze.py || {
            echo "❌ Freeze step failed"
            exit 1
          }

      - name: Smoke Test build CSS ✅
        run: |
          set -euo pipefail
          if [ ! -s build/static/css/styles.css ]; then
            echo "❌ build/static/css/styles.css is missing or empty"
            exit 1
          fi

      - name: Deploy to GitHub Pages 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: build
          clean: true
          single-commit: true
